<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USC FIT - Find Your Match</title>
    <style>
        :root {
            --usc-cardinal: #992233;
            --usc-gold: #FFCC00;
            --bg-dark: #121212;
            --card-white: #ffffff;
            --text-main: #333;
            --text-muted: #666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: repeating-linear-gradient(45deg, #1a1a1a 0px, #1a1a1a 2px, transparent 2px, transparent 10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            color: white;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--usc-gold);
            font-size: 28px;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        .header p {
            font-size: 10px;
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .card {
            background: var(--card-white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            color: var(--text-main);
        }

        .card h2 {
            margin: 0 0 6px 0;
            font-size: 22px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }

        #status {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        #results {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ----- Match card styles ----- */

        .match-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: #f8f8f8;
            border-radius: 10px;
            transition: background-color 0.15s ease, transform 0.15s ease;
        }

        .match-card:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
        }

        .match-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--usc-cardinal);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .match-info {
            flex: 1;
            min-width: 0;
        }

        .match-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .match-meta {
            font-size: 13px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .match-rating {
            font-size: 12px;
            color: #b88600;
            margin-top: 2px;
        }

        .match-score {
            font-weight: 700;
            font-size: 16px;
            color: var(--usc-cardinal);
            flex-shrink: 0;
            min-width: 48px;
            text-align: right;
            align-self: flex-start;
            margin-top: 4px;
        }

        /* ----- Action buttons inside the card ----- */

        .match-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .card-action {
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .card-action-secondary {
            background: white;
            color: var(--usc-cardinal);
            border: 1px solid var(--usc-cardinal);
        }

        .card-action-secondary:hover {
            background: #fdf2f4;
        }

        .card-action-primary {
            background: var(--usc-cardinal);
            color: white;
            border: 1px solid var(--usc-cardinal);
        }

        .card-action-primary:hover {
            background: #7a1b29;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 13px;
            color: var(--usc-cardinal);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>USC FIT</h1>
        <p>Campus Fitness Platform</p>
    </div>

    <div class="card">
        <h2>Find Your Match</h2>
        <p class="subtitle">Trojans who fit your schedule and skill level</p>

        <div id="status">Loading matches...</div>
        <div id="results"></div>

        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script src="matching.js"></script>
</body>
</html>
